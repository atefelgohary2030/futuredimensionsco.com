  <rect x="145" y="135" width="330" height="24" rx="12" fill="url(#gold)"/>
  <rect x="145" y="200" width="70" height="130" rx="12" fill="url(#teal)" opacity=".85"/><rect x="245" y="170" width="70" height="160" rx="12" fill="url(#gold)" opacity=".95"/><rect x="345" y="220" width="70" height="110" rx="12" fill="#fff" opacity=".22"/><rect x="445" y="185" width="70" height="145" rx="12" fill="url(#teal)" opacity=".66"/>
