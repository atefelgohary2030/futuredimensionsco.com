  <rect x="520" y="95" width="265" height="300" rx="30" fill="rgba(255,255,255,.065)" stroke="rgba(46,196,182,.30)"/><rect x="565" y="145" width="130" height="20" rx="10" fill="url(#teal)"/><rect x="565" y="200" width="175" height="14" rx="7" fill="#fff" opacity=".22"/><rect x="565" y="235" width="145" height="14" rx="7" fill="#fff" opacity=".16"/><rect x="565" y="300" width="140" height="34" rx="17" fill="url(#gold)"/>
