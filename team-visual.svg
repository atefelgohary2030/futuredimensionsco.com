  <circle cx="320" cy="175" r="52" fill="rgba(255,255,255,.075)" stroke="rgba(46,196,182,.35)"/><circle cx="880" cy="175" r="52" fill="rgba(255,255,255,.075)" stroke="rgba(46,196,182,.35)"/><circle cx="350" cy="360" r="52" fill="rgba(255,255,255,.075)" stroke="rgba(241,215,122,.35)"/><circle cx="850" cy="360" r="52" fill="rgba(255,255,255,.075)" stroke="rgba(241,215,122,.35)"/>
