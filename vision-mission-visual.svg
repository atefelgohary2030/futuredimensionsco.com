<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Vision and mission visual</title>
<desc id="desc">Strategic roadmap, compass, and transformation pathway.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06101f"/><stop offset=".52" stop-color="#10213d"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff2bf"/><stop offset=".52" stop-color="#D4AF37"/><stop offset="1" stop-color="#A77B1E"/></linearGradient>
  <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2EC4B6"/><stop offset="1" stop-color="#0E7670"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".38"/></filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="30"/></filter>
</defs>
<rect width="1200" height="520" rx="36" fill="url(#bg)"/>
<circle cx="1050" cy="95" r="230" fill="#D4AF37" opacity=".08" filter="url(#soft)"/>
<circle cx="130" cy="430" r="250" fill="#2EC4B6" opacity=".10" filter="url(#soft)"/>
<g opacity=".09" stroke="#fff" fill="none"><path d="M70 85h520M70 435h410M760 440h350"/><path d="M75 120h310M875 90h220M875 126h165"/></g>

<path d="M120 414 C245 300 362 334 505 238 C660 135 795 145 1030 72" stroke="#F1D77A" stroke-width="5" fill="none" opacity=".25"/>
<g filter="url(#shadow)">
  <circle cx="610" cy="245" r="150" fill="rgba(255,255,255,.06)" stroke="rgba(241,215,122,.34)" stroke-width="3"/>
  <circle cx="610" cy="245" r="96" fill="rgba(46,196,182,.06)" stroke="rgba(46,196,182,.30)"/>
  <path d="M610 132 L654 257 L548 345 L585 220 Z" fill="url(#gold)"/>
  <circle cx="610" cy="245" r="17" fill="url(#teal)"/>
</g>
<g filter="url(#shadow)"><rect x="122" y="150" width="230" height="190" rx="26" fill="rgba(255,255,255,.07)" stroke="rgba(46,196,182,.30)"/><rect x="158" y="190" width="115" height="18" rx="9" fill="url(#teal)"/><rect x="158" y="235" width="145" height="14" rx="7" fill="#fff" opacity=".22"/><rect x="158" y="270" width="115" height="14" rx="7" fill="#fff" opacity=".16"/></g>
<g filter="url(#shadow)"><rect x="855" y="150" width="230" height="190" rx="26" fill="rgba(255,255,255,.07)" stroke="rgba(241,215,122,.30)"/><rect x="890" y="190" width="120" height="18" rx="9" fill="url(#gold)"/><rect x="890" y="235" width="145" height="14" rx="7" fill="#fff" opacity=".22"/><rect x="890" y="270" width="115" height="14" rx="7" fill="#fff" opacity=".16"/></g>

</svg>