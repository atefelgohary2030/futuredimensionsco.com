<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Vision and mission visual</title>
<desc id="desc">Strategic roadmap, compass, and transformation pathway.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06101f"/><stop offset=".5" stop-color="#10213d"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFF0B8"/><stop offset=".5" stop-color="#D4AF37"/><stop offset="1" stop-color="#A37A1F"/></linearGradient>
  <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2EC4B6"/><stop offset="1" stop-color="#0E7670"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".38"/></filter>
</defs>
<rect width="1200" height="520" rx="36" fill="url(#bg)"/>
<path d="M90 415 C210 300, 315 340, 455 245 C610 140, 735 155, 905 75" stroke="#F1D77A" stroke-width="4" fill="none" opacity=".22"/>
<path d="M160 420 H1030" stroke="#fff" opacity=".08" stroke-width="2"/>
