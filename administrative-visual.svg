<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Administrative and operational consulting visual</title>
<desc id="desc">Governance documentation, process mapping, and operating discipline.</desc>
<defs>
