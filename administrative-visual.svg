  <rect x="155" y="165" width="210" height="24" rx="12" fill="url(#gold)"/>
  <rect x="155" y="220" width="240" height="16" rx="8" fill="#fff" opacity=".22"/><rect x="155" y="258" width="198" height="16" rx="8" fill="#fff" opacity=".16"/><rect x="155" y="296" width="230" height="16" rx="8" fill="#fff" opacity=".18"/>
