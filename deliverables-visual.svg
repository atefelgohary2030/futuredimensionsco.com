<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Consulting deliverables visual</title>
<desc id="desc">Reports, dashboards, roadmaps, and implementation-ready outputs.</desc>
<defs>
