<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Insights and thought leadership visual</title>
<desc id="desc">Consulting insights, research briefs, and business intelligence.</desc>
<defs>
