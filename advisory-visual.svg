<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Consulting advisory visual</title>
<desc id="desc">Professional consulting dashboard, executive meeting, and performance indicators.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06101f"/><stop offset=".52" stop-color="#10213d"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff2bf"/><stop offset=".52" stop-color="#D4AF37"/><stop offset="1" stop-color="#A77B1E"/></linearGradient>
  <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2EC4B6"/><stop offset="1" stop-color="#0E7670"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".38"/></filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="30"/></filter>
</defs>
<rect width="1200" height="520" rx="36" fill="url(#bg)"/>
<circle cx="1050" cy="95" r="230" fill="#D4AF37" opacity=".08" filter="url(#soft)"/>
<circle cx="130" cy="430" r="250" fill="#2EC4B6" opacity=".10" filter="url(#soft)"/>
<g opacity=".09" stroke="#fff" fill="none"><path d="M70 85h520M70 435h410M760 440h350"/><path d="M75 120h310M875 90h220M875 126h165"/></g>

