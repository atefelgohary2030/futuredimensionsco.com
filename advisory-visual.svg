  <circle cx="730" cy="205" r="46" fill="url(#gold)" opacity=".92"/>
  <circle cx="845" cy="205" r="46" fill="url(#teal)" opacity=".85"/>
  <circle cx="960" cy="205" r="46" fill="#fff" opacity=".18"/>
  <rect x="700" y="295" width="285" height="16" rx="8" fill="#fff" opacity=".22"/>
  <rect x="738" y="328" width="210" height="14" rx="7" fill="#fff" opacity=".16"/>
