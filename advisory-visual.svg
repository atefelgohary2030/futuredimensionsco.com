  <rect x="145" y="132" width="220" height="22" rx="11" fill="url(#gold)"/>
  <rect x="145" y="185" width="78" height="120" rx="14" fill="url(#teal)" opacity=".82"/>
  <rect x="255" y="160" width="78" height="145" rx="14" fill="url(#gold)" opacity=".92"/>
  <rect x="365" y="210" width="78" height="95" rx="14" fill="#ffffff" opacity=".22"/>
  <path d="M145 335 C225 292, 277 306, 338 238 C395 174, 430 188, 490 135" fill="none" stroke="#F1D77A" stroke-width="8" stroke-linecap="round"/>
