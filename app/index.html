<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#091323">
  <meta name="description" content="Future Dimensions Client Portal - secure client workspace for consulting projects, documents, invoices, support tickets and meetings.">
  <meta property="og:title" content="Future Dimensions Client Portal">
  <meta property="og:description" content="A secure portal for clients to track consulting projects, documents, invoices and support requests.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="logo.png">
  <title>Future Dimensions Client Portal</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
  <style>
    :root{
      --navy:#07101f;
      --navy2:#0c1a2d;
      --navy3:#122540;
      --panel:#101d31;
      --panel2:#13233a;
      --gold:#d7ad38;
      --gold2:#f0cf67;
      --gold3:#9c7621;
      --text:#f6f8fc;
      --muted:#aeb8c9;
      --soft:#e8edf5;
      --danger:#ff6b6b;
      --success:#5bd49b;
      --warning:#ffc766;
      --line:rgba(255,255,255,.11);
      --shadow:0 24px 70px rgba(0,0,0,.38);
      --radius:24px;
      --max:1240px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left,rgba(18,78,104,.55),transparent 28%),
        radial-gradient(circle at 82% 5%,rgba(215,173,56,.13),transparent 25%),
        linear-gradient(135deg,#050b14,#091427 43%,#07101f);
      color:var(--text);
      font-family:Inter,Segoe UI,Tahoma,Arial,sans-serif;
      overflow-x:hidden;
    }
    html[dir="rtl"] body{font-family:Tajawal,Cairo,Segoe UI,Tahoma,Arial,sans-serif}
    body::before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background-image:url('logo.png');
      background-size:620px auto;
      background-position:85% 22%;
      background-repeat:no-repeat;
      opacity:.045;
      filter:grayscale(100%);
      z-index:-1;
    }
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hide{display:none!important}
    .ltr{direction:ltr;text-align:left}
    .shell{min-height:100vh;display:grid;grid-template-columns:286px 1fr}
    .sidebar{
      position:sticky; top:0; height:100vh; padding:22px 18px;
      background:rgba(5,11,20,.78); border-inline-end:1px solid var(--line); backdrop-filter:blur(22px);
      display:flex; flex-direction:column; gap:20px; z-index:20;
    }
    .brand{display:flex;align-items:center;gap:12px;padding:8px 8px 18px;border-bottom:1px solid var(--line)}
    .brand img{width:55px;height:55px;object-fit:contain;filter:drop-shadow(0 12px 24px rgba(215,173,56,.18))}
    .brandTitle{font-weight:900;line-height:1.1;letter-spacing:.2px}
    .brandSub{font-size:12px;color:var(--gold2);margin-top:4px}
    .statusBox{
      display:grid;gap:10px;padding:14px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
    }
    .statusLine{display:flex;justify-content:space-between;gap:10px;align-items:center;color:var(--muted);font-size:12px}
    .dot{width:10px;height:10px;border-radius:999px;display:inline-block;background:var(--warning);box-shadow:0 0 0 4px rgba(255,199,102,.12)}
    .dot.ok{background:var(--success);box-shadow:0 0 0 4px rgba(91,212,155,.12)}
    .dot.bad{background:var(--danger);box-shadow:0 0 0 4px rgba(255,107,107,.12)}
    .nav{display:grid;gap:8px}
    .nav button{
      width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:16px;border:1px solid transparent;
      background:transparent;color:var(--muted);text-align:inherit;font-weight:750;
    }
    .nav button:hover{background:rgba(255,255,255,.06);color:#fff;border-color:var(--line)}
    .nav button.active{background:linear-gradient(135deg,rgba(215,173,56,.25),rgba(215,173,56,.08));color:#fff;border-color:rgba(215,173,56,.45);box-shadow:0 14px 40px rgba(0,0,0,.18)}
    .navIcon{width:28px;height:28px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.07);font-size:14px}
    .sideFooter{margin-top:auto;display:grid;gap:10px;color:var(--muted);font-size:12px}
    .main{min-width:0;display:flex;flex-direction:column}
    .topbar{
      position:sticky;top:0;z-index:18;display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:18px 26px;background:rgba(7,16,31,.72);border-bottom:1px solid var(--line);backdrop-filter:blur(20px);
    }
    .mobileMenu{display:none}
    .topTitle{display:grid;gap:3px}
    .topTitle h1{margin:0;font-size:21px;letter-spacing:.2px}
    .topTitle p{margin:0;color:var(--muted);font-size:13px}
    .topActions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .btn{
      border:0;border-radius:15px;padding:12px 16px;background:var(--gold);color:#07101f;font-weight:900;box-shadow:0 14px 28px rgba(215,173,56,.2);display:inline-flex;align-items:center;gap:9px;justify-content:center;
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(1.04)}
    .btn.secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid var(--line);box-shadow:none}
    .btn.ghost{background:transparent;color:#fff;border:1px solid var(--line);box-shadow:none}
    .btn.danger{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.32);color:#ffd7d7;box-shadow:none}
    .btn.small{padding:9px 12px;border-radius:12px;font-size:13px}
    .content{padding:26px;max-width:var(--max);width:100%;margin:0 auto}
    .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:stretch;margin-bottom:22px}
    .glass{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(145deg,rgba(255,255,255,.095),rgba(255,255,255,.035));box-shadow:var(--shadow);backdrop-filter:blur(20px);overflow:hidden}
    .heroCard{padding:28px;position:relative}
    .eyebrow{color:var(--gold2);font-weight:900;letter-spacing:.5px;text-transform:uppercase;font-size:12px;margin-bottom:10px}
    html[dir="rtl"] .eyebrow{letter-spacing:0;text-transform:none}
    .hero h2{font-size:38px;line-height:1.08;margin:0 0 12px}
    .hero p{font-size:16px;line-height:1.9;color:#dce4f1;margin:0 0 18px;max-width:760px}
    .heroGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:20px}
    .miniMetric{padding:14px;border-radius:18px;background:rgba(0,0,0,.18);border:1px solid var(--line)}
    .miniMetric strong{font-size:24px;color:#fff;display:block}
    .miniMetric span{color:var(--muted);font-size:12px}
    .loginPanel{padding:22px;background:linear-gradient(145deg,rgba(215,173,56,.18),rgba(255,255,255,.04))}
    .sectionTitle{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:18px 0 14px}
    .sectionTitle h3{margin:0;font-size:22px}
    .sectionTitle p{margin:0;color:var(--muted);font-size:13px}
    .grid{display:grid;gap:16px}.grid.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{padding:18px;border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border:1px solid var(--line);box-shadow:0 18px 45px rgba(0,0,0,.18)}
    .card.gold{background:linear-gradient(145deg,#f3dc8d,#c89b24);color:#07101f;border-color:rgba(255,255,255,.28)}
    .card h4{margin:0 0 8px;font-size:17px}.card p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}.card.gold p{color:#1f2531}.card.gold .muted{color:#273141}
    .metric{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.metricIcon{width:42px;height:42px;border-radius:15px;background:rgba(215,173,56,.18);display:grid;place-items:center;color:var(--gold2);font-weight:900}
    .metricVal{font-size:30px;font-weight:950}.metricLabel{color:var(--muted);font-size:13px;margin-top:4px}
    .progress{height:11px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
    .progress span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:999px;width:0}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;background:rgba(255,255,255,.08);border:1px solid var(--line);color:#e8edf7}
    .badge.success{background:rgba(91,212,155,.11);border-color:rgba(91,212,155,.27);color:#bff4d8}.badge.warn{background:rgba(255,199,102,.11);border-color:rgba(255,199,102,.28);color:#ffe1a6}.badge.danger{background:rgba(255,107,107,.11);border-color:rgba(255,107,107,.30);color:#ffd0d0}.badge.gold{background:rgba(215,173,56,.14);border-color:rgba(215,173,56,.34);color:#ffe6a0}
    .field{display:grid;gap:8px;margin-bottom:12px}.field label{font-size:12px;color:var(--muted);font-weight:800}.input,select,textarea{width:100%;background:rgba(5,11,20,.72);border:1px solid var(--line);border-radius:15px;color:#fff;padding:13px 14px;outline:none}.input:focus,select:focus,textarea:focus{border-color:rgba(215,173,56,.6);box-shadow:0 0 0 4px rgba(215,173,56,.10)}textarea{min-height:112px;resize:vertical}
    .split{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.muted{color:var(--muted)}.smallText{font-size:12px;line-height:1.7}.hint{border:1px dashed rgba(255,255,255,.16);border-radius:18px;padding:14px;background:rgba(255,255,255,.035);color:var(--muted);line-height:1.8}
    .tableWrap{overflow:auto;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.035)}table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:14px;border-bottom:1px solid rgba(255,255,255,.08);text-align:inherit;vertical-align:middle}th{font-size:12px;color:var(--muted);font-weight:900;background:rgba(255,255,255,.035)}td{font-size:14px}tr:last-child td{border-bottom:0}
    .projectCard{display:grid;gap:16px}.projectHead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.stageList{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.stage{padding:11px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px}.stage.done{background:rgba(91,212,155,.09);border-color:rgba(91,212,155,.24);color:#d7ffe9}.stage.current{background:rgba(215,173,56,.13);border-color:rgba(215,173,56,.36);color:#ffe7a4}
    .timeline{display:grid;gap:12px}.timeItem{display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:start}.timeDot{width:34px;height:34px;border-radius:14px;background:rgba(215,173,56,.18);display:grid;place-items:center;color:var(--gold2);font-weight:950;border:1px solid rgba(215,173,56,.30)}.timeBody{padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}.timeBody strong{display:block}.timeBody span{font-size:12px;color:var(--muted);line-height:1.7}
    .empty{text-align:center;padding:36px 18px;color:var(--muted)}.emptyIcon{font-size:42px;margin-bottom:10px}.divider{height:1px;background:var(--line);margin:16px 0}
    .toast{position:fixed;bottom:22px;left:22px;z-index:200;display:grid;gap:10px}.toastItem{background:#101b2d;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:12px 14px;max-width:360px;line-height:1.6}.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}.modalBackdrop.show{display:flex}.modal{width:min(680px,100%);max-height:86vh;overflow:auto;background:#0c1728;border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow)}.modalHead{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}.modalBody{padding:20px}.pillBar{display:flex;gap:8px;flex-wrap:wrap}.pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:850}
    @media (max-width:1080px){.shell{grid-template-columns:1fr}.sidebar{position:fixed;inset-block:0;inset-inline-start:0;width:310px;transform:translateX(-110%);transition:.25s ease;box-shadow:var(--shadow)}html[dir="rtl"] .sidebar{transform:translateX(110%)}.sidebar.open{transform:translateX(0)}.mobileMenu{display:inline-flex}.hero,.grid.cols2,.grid.cols3,.grid.cols4{grid-template-columns:1fr}.stageList{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:640px){.topbar{padding:14px}.content{padding:16px}.hero h2{font-size:28px}.heroCard{padding:20px}.loginPanel{padding:18px}.topActions{gap:7px}.btn{padding:10px 12px}.brandTitle{font-size:14px}.stageList{grid-template-columns:1fr}.heroGrid{grid-template-columns:1fr}.toast{left:12px;right:12px}.toastItem{max-width:none}}


    /* Mobile-first enhancements - v4002 */
    .mobileBottomNav{display:none}

      :root{--radius:18px}
      body{background:linear-gradient(160deg,#050b14,#091427 55%,#06111f)}
      body::before{background-size:360px auto;background-position:120% 14%;opacity:.035}
      .shell{display:block;min-height:100vh}
      .sidebar{width:min(86vw,330px);padding:18px 14px 90px;overflow:auto;z-index:80}
      .brand img{width:48px;height:48px}.brandTitle{font-size:15px}.brandSub{font-size:11px}
      .statusBox{padding:12px;border-radius:16px}.statusLine{font-size:11px}
      .nav{gap:6px}.nav button{padding:12px;border-radius:14px;font-size:14px}.navIcon{width:28px;height:28px}
      .topbar{padding:10px 12px;gap:8px;align-items:center;position:sticky;top:0;z-index:50;background:rgba(7,16,31,.90)}
      .topTitle h1{font-size:17px;line-height:1.25}.topTitle p{font-size:11px;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .topActions{gap:6px;justify-content:flex-end}.topActions .btn{font-size:12px;padding:9px 10px;border-radius:12px}
      #refreshBtn{display:none}.mobileMenu{display:inline-flex;padding:9px 12px!important}
      #requestAccessBtn{max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .content{padding:14px 12px 104px;max-width:100%}
      .hero{gap:14px}.heroCard{padding:18px}.loginPanel{padding:16px}.hero h2{font-size:26px;line-height:1.15}.hero p{font-size:14px;line-height:1.75}.eyebrow{font-size:11px}
      .split{gap:8px}.split .btn{flex:1 1 auto}.btn{min-height:42px;padding:10px 12px;border-radius:13px;font-size:13px}.btn.small{min-height:38px;padding:8px 10px;font-size:12px}
      .heroGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.miniMetric{padding:12px;border-radius:15px}.miniMetric strong{font-size:20px}.miniMetric span{font-size:11px;line-height:1.45;display:block}
      .grid{gap:12px}.grid.cols2,.grid.cols3{grid-template-columns:1fr!important}.grid.cols4{grid-template-columns:repeat(2,minmax(0,1fr))!important}
      .card{padding:14px;border-radius:18px}.card h4{font-size:15px}.card p{font-size:13px;line-height:1.65}.card.gold{text-align:inherit;min-height:104px}
      .metricIcon{width:34px;height:34px;border-radius:12px}.metricVal{font-size:25px}.metricLabel{font-size:11px;line-height:1.35}
      .sectionTitle{align-items:flex-start;margin:16px 0 10px}.sectionTitle h3{font-size:18px}.sectionTitle p{font-size:12px;line-height:1.55}.sectionTitle .btn{flex:0 0 auto}
      .projectHead{gap:10px}.projectHead h4{line-height:1.35}.stageList{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px}.stage{font-size:11px;padding:9px;border-radius:12px;text-align:center}
      .progress{height:10px}.hint{padding:12px;border-radius:15px;font-size:12px}.pillBar{gap:6px}.pill{font-size:11px;padding:7px 9px}
      .field{gap:6px;margin-bottom:10px}.field label{font-size:11px}.input,select,textarea{padding:12px;border-radius:13px;font-size:14px}textarea{min-height:96px}
      .timeline{gap:10px}.timeItem{grid-template-columns:34px 1fr;gap:10px}.timeDot{width:30px;height:30px;border-radius:11px}.timeBody strong{font-size:13px}.timeBody span{font-size:11px}
      .tableWrap{display:none}.mobileList{display:grid;gap:10px}.mobileListItem{padding:13px;border-radius:16px;background:rgba(255,255,255,.065);border:1px solid var(--line)}.mobileListItem h4{margin:0 0 8px;font-size:14px}.mobileMeta{display:grid;gap:7px;margin:10px 0}.mobileMeta div{display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:12px;color:var(--muted)}.mobileMeta b{color:#fff;text-align:end}.mobileMeta .badge{font-size:11px}
      .toast{left:10px;right:10px;bottom:86px}.toastItem{max-width:none;font-size:13px;border-radius:14px;padding:11px 12px}
      .modalBackdrop{align-items:flex-end;padding:0}.modal{width:100%;max-height:84vh;border-radius:24px 24px 0 0;border-inline:0;border-bottom:0}.modalHead{padding:15px}.modalBody{padding:15px}.modalBody .grid.cols2{grid-template-columns:1fr!important}
      .sideFooter{font-size:11px}
      .mobileBottomNav{position:fixed;left:0;right:0;bottom:0;z-index:70;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(7,16,31,.94);border-top:1px solid var(--line);backdrop-filter:blur(18px);box-shadow:0 -18px 50px rgba(0,0,0,.28)}
      .mobileBottomNav button{appearance:none;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:14px;padding:8px 4px 7px;display:grid;place-items:center;gap:3px;font-weight:850;font-size:10px;min-width:0}
      .mobileBottomNav button .navIcon{width:24px;height:22px;border-radius:9px;font-size:12px;background:rgba(255,255,255,.06)}
      .mobileBottomNav button.active{background:rgba(215,173,56,.16);border-color:rgba(215,173,56,.32);color:#fff}.mobileBottomNav button.active .navIcon{background:rgba(215,173,56,.26);color:var(--gold2)}
      .mobileBottomNav span:last-child{max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    }
    @media (max-width:380px){.heroGrid,.grid.cols4{grid-template-columns:1fr!important}.topTitle p{max-width:150px}.topActions #requestAccessBtn{display:none}.card{padding:13px}.content{padding-inline:10px}}


    /* Premium mobile polish + fixed drawer/menu - v4003 */
    .topLogo{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 10px 22px rgba(215,173,56,.22))}
    .drawerBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:75}
    .drawerBackdrop.show{display:block}
    .installFab{display:none;position:fixed;right:14px;bottom:92px;z-index:72;border:1px solid rgba(215,173,56,.48);border-radius:999px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#07101f;font-weight:950;padding:11px 14px;box-shadow:0 18px 42px rgba(0,0,0,.36),0 0 0 5px rgba(215,173,56,.12);gap:8px;align-items:center}
    html[dir="rtl"] .installFab{right:auto;left:14px}
    .installFab:hover{transform:translateY(-2px)}
    .actionRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .adminNote{border:1px solid rgba(215,173,56,.30);background:linear-gradient(135deg,rgba(215,173,56,.13),rgba(255,255,255,.035));border-radius:18px;padding:14px;color:#f6e3a2;line-height:1.8}
    .premiumGlow{position:relative;overflow:hidden}
    .premiumGlow::before{content:"";position:absolute;inset:-40% -20% auto auto;width:220px;height:220px;background:radial-gradient(circle,rgba(240,207,103,.24),transparent 66%);pointer-events:none}
    .card,.glass{transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
    @media (hover:hover){.card:hover,.glass:hover{transform:translateY(-2px);border-color:rgba(215,173,56,.24);box-shadow:0 24px 70px rgba(0,0,0,.30)}}
    @media (max-width:760px){
      .sidebar.open{transform:translate3d(0,0,0)!important;z-index:110}
      .topLogo{width:30px;height:30px}
      .topActions #installBtnTop{display:none!important}
      .mobileBottomNav{display:flex!important;grid-template-columns:none!important;overflow-x:auto;scroll-snap-type:x mandatory;gap:6px;padding-inline:8px;-webkit-overflow-scrolling:touch}
      .mobileBottomNav::-webkit-scrollbar{display:none}
      .mobileBottomNav button{min-width:74px;scroll-snap-align:center;flex:0 0 auto}
      .mobileBottomNav button .navIcon{width:25px;height:23px}
      .content{padding-bottom:136px!important}
      .heroCard.glass,.loginPanel.glass{background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.035));border-color:rgba(215,173,56,.18)}
      .card.gold{background:linear-gradient(145deg,#ffe79a,#d5a531 60%,#b9881d);box-shadow:0 18px 48px rgba(0,0,0,.24)}
    }



    /* Mobile V4 refinements: resources, install placement, dashboard metrics */
    #installBtnSide{
      width:100%;
      justify-content:center;
      border-color:rgba(215,173,56,.42)!important;
      background:rgba(215,173,56,.10)!important;

    async function callAdminFunction(action,payload={}){
      if(!isAdmin()) throw new Error(t('notAdmin'));
      if(!state.sb || !state.session) throw new Error(t('signInNeeded'));
      const {data,error}=await state.sb.functions.invoke(FD_ADMIN_FUNCTION,{body:{action,...payload}});
      if(error) throw error;
      if(data && data.error) throw new Error(data.error);
      return data;
    }
    async function updateRequestStatus(id,status){
      if(!isAdmin()) return toast(t('notAdmin'));
      const rows=state.data.access_requests||[]; const item=rows.find(x=>String(x.id)===String(id));
      try{
        if(state.sb && state.session){ await callAdminFunction(status==='rejected'?'reject_request':'approve_request',{request_id:id}); await loadData(); }
        else if(item){ item.status=status; }
        render(); setTimeout(()=>adminShow('requests'),80); toast(t('saved'));
      }catch(e){
        if(item && state.demoMode){ item.status=status; render(); setTimeout(()=>adminShow('requests'),80); toast(t('saved')); }
        else { toast(e.message||t('failed')); showModal(t('setupRequired'), `<div class="softWarning">${t('edgeNotReady')}</div><div class="copyBox">${escapeHtml(e.message||'')}</div>`); }
      }
    }
    window.approveRequest=(id)=>updateRequestStatus(id,'approved');
    window.rejectRequest=(id)=>updateRequestStatus(id,'rejected');

      if(!isAdmin()) return toast(t('notAdmin'));

        if(state.sb && state.session){ await callAdminFunction('create_client',{client:row}); await loadData(); }
        else{ const list=state.data.clients||[]; const i=list.findIndex(x=>String(x.email).toLowerCase()===String(row.email).toLowerCase()); if(i>=0) list[i]={...list[i],...row}; else list.unshift({...row,id:'c'+Date.now(),created_at:new Date().toISOString()}); state.data.clients=list; }
        toast(t('saved')); render(); setTimeout(()=>adminShow('clients'),80);
      }catch(e){toast(e.message||t('failed')); showModal(t('setupRequired'), `<div class="softWarning">${t('edgeNotReady')}</div><div class="copyBox">${escapeHtml(e.message||'')}</div>`);}
    }

    async function downloadFile(kind,id){
      const list = kind==='invoices'?state.data.invoices:state.data.documents; const item=list.find(x=>String(x.id)===String(id));
      if(!item){toast(t('failed'));return;} if(!item.storage_path){showModal(nameOf(item), `<div class="empty"><div class="emptyIcon">▣</div><p>${state.lang==='ar'?'هذا عنصر تجريبي أو لا يحتوي على ملف مرفوع.':'This is a demo item or has no uploaded file.'}</p></div>`);return;}
      if(!requireAuth()) return; try{ const bucket=kind==='invoices'?INV_BUCKET:DOC_BUCKET; const {data,error}=await state.sb.storage.from(bucket).createSignedUrl(item.storage_path,60); if(error) throw error; window.open(data.signedUrl,'_blank'); }catch(e){toast(e.message||t('failed'));}
    }
    async function deleteRecord(kind,id){
      id = decodeURIComponent(id||'');
      if(!isAdmin()){ toast(t('notAdmin')); return; }
      if(!confirm(t('confirmDelete'))) return;
      const table = kind==='invoices' ? 'invoices' : 'documents';
      const bucket = kind==='invoices' ? INV_BUCKET : DOC_BUCKET;
      const list = state.data[table] || [];
      const item = list.find(x=>String(x.id)===String(id));
      try{
        if(state.sb && state.session && !state.demoMode){
          if(item?.storage_path){ await state.sb.storage.from(bucket).remove([item.storage_path]); }
          const {error}=await state.sb.from(table).delete().eq('id', id);
          if(error) throw error;
          await loadData();
        }else{
          state.data[table] = list.filter(x=>String(x.id)!==String(id));
        }
        toast(t('deleted')); render();
      }catch(e){ toast(e.message || t('failed')); }
    }
    window.deleteRecord = deleteRecord;

      showModal(t('installApp'), `<div class="adminNote">${t('installInstructions')}</div>`);
    }
    function openMobileMenu(){ $('sidebar').classList.add('open'); $('drawerBackdrop').classList.add('show'); document.body.classList.add('drawer-open'); }
    function closeMobileMenu(){ $('sidebar').classList.remove('open'); $('drawerBackdrop').classList.remove('show'); document.body.classList.remove('drawer-open'); }
    if($('installBtnSide')) $('installBtnSide').onclick=installApp;
    $('mobileMenu').addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation(); $('sidebar').classList.contains('open')?closeMobileMenu():openMobileMenu();});
    $('drawerBackdrop').addEventListener('click',closeMobileMenu);
    document.addEventListener('keydown',(e)=>{if(e.key==='Escape') closeMobileMenu();});
    document.querySelector('.content').addEventListener('click',()=>{ if(innerWidth<1080) closeMobileMenu(); });
    $('langBtn').onclick=()=>{state.lang=state.lang==='ar'?'en':'ar';render();}; $('refreshBtn').onclick=async()=>{await loadData();render();toast(t('refresh'));}; $('requestAccessBtn').onclick=requestAccess; $('logoutBtn').onclick=logout; $('modalClose').onclick=closeModal; $('modalBackdrop').addEventListener('click',(e)=>{if(e.target.id==='modalBackdrop')closeModal();});
    (async function boot(){
      updateInstallButtons();
      if('serviceWorker' in navigator){ try{ await navigator.serviceWorker.register('sw.js?v=4007'); }catch(e){console.warn(e)} }
      await initSupabase(); await loadData(); render();
    })();
  </script>
</body>
</html>
